<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水晶蓝玫瑰</title>
  <!-- 引入Poppins字体（修复字体未引入问题） -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #000;
      overflow: hidden;
    }

    .banner {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      /* Flex布局无用，删除多余属性 */
    }

    .banner video {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 30%;
      max-width: 800px;
      /* 高度自动，保持视频比例 */
      height: auto;

      /* 视频完整显示，不裁剪 */
      pointer-events: none;
    }

    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* 提前定义动画规则（修复粒子动画逻辑） */
      @keyframes float {
        0% {
          transform: translateY(0) translateX(0);
        }

        100% {
          transform: translateY(-100vh) translateX(var(--tx));
        }

        /* 使用CSS变量接收随机值 */
      }
  </style>
</head>

<body>
  <div class="banner">
    <!-- 修复：1.相对路径 2.补充播放属性 3.添加source和降级提示 -->
    <video autoplay muted loop preload="auto">
      <!-- 替换为你的视频相对路径（视频文件和HTML同文件夹） -->
      <source src="./rose.mp4" type="video/mp4">
    </video>
    <div class="particles"></div>
  </div>

  <script>
    const particles = document.querySelector('.particles');
    for (let i = 0; i < 50; i++) {
      const particle = document.createElement('div');
      // 随机平移距离（修复动画逻辑：每个粒子独立随机值）
      const tx = Math.random() * 100 - 50 + 'px';
      particle.style.cssText = `
        position: absolute;
        width: ${Math.random() * 5 + 2}px;
        height: ${Math.random() * 5 + 2}px;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 50%;
        top: ${Math.random() * 100}%;
        left: ${Math.random() * 100}%;
        animation: float ${Math.random() * 10 + 10}s linear infinite;
        opacity: ${Math.random() * 0.5 + 0.2};
        --tx: ${tx}; /* 给每个粒子设置独立的CSS变量 */
      `;
      particles.appendChild(particle);
    }
  </script>
</body>

</html>
